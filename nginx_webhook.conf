# Aggiungi questo dentro il blocco server {} di /etc/nginx/sites-available/default
# oppure in /etc/nginx/conf.d/cryptopredict.conf

location /webhook/ {
    proxy_pass http://127.0.0.1:9000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 30s;
}
